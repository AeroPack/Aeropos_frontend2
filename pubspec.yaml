name: ezo
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.0.0
  bitsdojo_window: ^0.1.6
  intl: ^0.20.2
  
  # Database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.8.3
  
  # Utilities
  uuid: ^4.2.0
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  http_parser: ^4.0.2
  
  # Network
  connectivity_plus: ^7.0.0
  flutter_riverpod: 2.6.1
  printing: ^5.12.0
  pdf: ^3.10.4
  dio: ^5.4.1
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.0
  
  # Rich Text Editor
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  google_sign_in: ^6.2.2
  firebase_core: ^4.4.0
  google_fonts: ^6.1.0
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code generation
  drift_dev: ^2.14.0
  build_runner: ^2.4.0

# SINGLE FLUTTER SECTION - CORRECT STRUCTURE
flutter:
  generate: true
  uses-material-design: true

 
  # Fonts section - ALL fonts defined here
  fonts:
    # Inter font
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    
    # Roboto font
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
    
    # Montserrat font
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
    
    # Playfair Display font
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
    
    # JetBrains Mono font
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

  # DO NOT add flutter_web_plugins here - it's already in dependencies